name: Run lessons and tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  course:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x", "1.26.x"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [[ -n "$unformatted" ]]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet packages
        run: go vet ./...

      - name: Run lesson packages
        run: |
          go test ./lessons/...
          while IFS= read -r package; do
            [[ -z "$package" ]] && continue
            echo "::group::go run $package"
            go run "$package"
            echo "::endgroup::"
          done < <(
            go list -f '{{if eq .Name "main"}}{{.ImportPath}}{{end}}' ./lessons/... |
              sed '/^$/d'
          )

      - name: Compile exercise starters
        run: |
          go list ./exercises/... |
            grep -v '/solution$' |
            xargs -r go test -run '^$'

      - name: Run exercise solutions
        run: |
          go list ./exercises/... |
            grep '/solution$' |
            xargs -r go test

      - name: Compile capstone starters
        run: |
          go test -run '^$' \
            ./capstones/comparative/starter/... \
            ./capstones/idiomatic/starter/...

      - name: Run capstone harness and solution tests
        run: |
          go test \
            ./capstones/comparative/starter/kvstore \
            ./capstones/comparative/solution/... \
            ./capstones/comparative/tests/... \
            ./capstones/idiomatic/starter/monitor \
            ./capstones/idiomatic/solution/... \
            ./capstones/idiomatic/tests/... \
            ./capstones

      - name: Run project tests
        run: go test ./project/...

      - name: Run race detector
        if: matrix.go-version == '1.26.x'
        run: |
          go test -race ./project/...
          go test -race ./lessons/10_concurrency/...
          go test -race ./lessons/11_application_integration/...
          go test -race ./exercises/10_concurrency/solution
          go test -race ./exercises/11_application_integration/solution

      - name: Measure project coverage
        if: matrix.go-version == '1.26.x'
        run: |
          go test -coverprofile=coverage.out \
            ./project/taskmanager \
            ./project/taskapi \
            ./project/taskclient
          bash scripts/check-coverage.sh coverage.out 85

      - name: Run fuzz smoke test
        if: matrix.go-version == '1.26.x'
        run: |
          go test -run '^$' \
            -fuzz '^FuzzParseKeyValue$' \
            -fuzztime=2s \
            ./lessons/08_testing/08_fuzzing

      - name: Run staticcheck
        if: matrix.go-version == '1.26.x'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          {
            go list ./lessons/...
            go list ./exercises/... | grep '/solution$'
            go list ./capstones/comparative/solution/...
            go list ./capstones/comparative/tests/...
            go list ./capstones/idiomatic/solution/...
            go list ./capstones/idiomatic/tests/...
            go list ./capstones/testsupport
            go list ./project/...
            go list ./tools/...
          } | xargs "$(go env GOPATH)/bin/staticcheck"

      - name: Scan vulnerabilities
        if: matrix.go-version == '1.26.x'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Check Markdown links
        run: go run ./tools/checklinks
