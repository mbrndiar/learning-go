name: Run lessons and tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  course:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x", "1.26.x"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [[ -n "$unformatted" ]]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet packages
        run: go vet ./...

      - name: Run lesson packages
        run: |
          go test ./lessons/...
          while IFS= read -r package; do
            [[ -z "$package" ]] && continue
            echo "::group::go run $package"
            go run "$package"
            echo "::endgroup::"
          done < <(
            go list -f '{{if eq .Name "main"}}{{.ImportPath}}{{end}}' ./lessons/... |
              sed '/^$/d'
          )

      - name: Compile exercise starters
        # Do not replace the defined test split with `go test ./...`: learner
        # starter behavior tests intentionally fail until exercises are solved.
        run: |
          go list ./exercises/... |
            grep -v '/solution$' |
            xargs -r go test -run '^$'

      - name: Run exercise solutions
        run: |
          go list ./exercises/... |
            grep '/solution$' |
            xargs -r go test

      - name: Compile and check Tasks starter harness
        run: |
          go test -timeout=2m -run '^$' ./projects/tasks/starter/...
          go test -timeout=2m -count=1 ./projects/tasks/starter/...

      - name: Run Tasks solution and contracts
        run: |
          go test -timeout=3m -count=1 \
            ./projects/tasks/solution/... \
            ./projects/tasks/tests/... \
            ./projects/tasks

      - name: Compile capstone starters
        run: |
          go test -run '^$' \
            ./capstones/comparative/starter/... \
            ./capstones/idiomatic/starter/...

      - name: Run capstone harness and solution tests
        run: |
          go test \
            ./capstones/comparative/starter/kvstore \
            ./capstones/comparative/solution/... \
            ./capstones/comparative/tests/... \
            ./capstones/idiomatic/starter/monitor \
            ./capstones/idiomatic/solution/... \
            ./capstones/idiomatic/tests/... \
            ./capstones

      - name: Run race detector
        if: matrix.go-version == '1.26.x'
        run: |
          go test -race \
            ./capstones/comparative/tests/... \
            ./capstones/idiomatic/solution/monitor/... \
            ./capstones/idiomatic/tests/...
          race_directory=capstones/comparative/.conformance/race
          trap 'rm -rf "$race_directory"' EXIT
          mkdir -p "$race_directory"
          go build -race \
            -o "$race_directory/kvstore" \
            ./capstones/comparative/solution/kvstore/cmd/kvstore
          COMPARATIVE_KV_PROGRAM="$PWD/$race_directory/kvstore" \
            go test -race -count=2 ./capstones/comparative/solution/kvstore
          rm -rf "$race_directory"
          trap - EXIT
          go test -race ./lessons/10_concurrency/...
          go test -race ./lessons/11_sql_and_sqlite/...
          go test -race ./lessons/12_rest_apis_and_clients/...
          go test -race ./exercises/10_concurrency/solution
          go test -race ./exercises/11_sql_and_sqlite/solution
          go test -race ./exercises/12_rest_apis_and_clients/solution
          go test -race -timeout=5m -count=1 ./projects/tasks/...

      - name: Enforce coverage thresholds
        if: matrix.go-version == '1.26.x'
        run: |
          comparative_coverage=capstones/comparative/.coverage
          cleanup() {
            rm -f tasks-coverage.out idiomatic-coverage.out comparative-coverage.out
            rm -rf "$comparative_coverage"
          }
          trap cleanup EXIT
          task_packages=$(go list ./projects/tasks/solution/... | grep -v '/cmd/')
          task_coverpkg=$(printf '%s\n' "$task_packages" | paste -sd, -)
          go test -timeout=3m -count=1 \
            -coverpkg="$task_coverpkg" \
            -coverprofile=tasks-coverage.out \
            $task_packages \
            ./projects/tasks/tests/... \
            ./projects/tasks
          bash scripts/check-coverage.sh tasks-coverage.out 85
          go test -timeout=3m -coverprofile=idiomatic-coverage.out \
            ./capstones/idiomatic/solution/monitor/...
          bash scripts/check-coverage.sh idiomatic-coverage.out 85
          mkdir -p \
            "$comparative_coverage/bin" \
            "$comparative_coverage/data"
          go build -cover \
            -coverpkg=./capstones/comparative/solution/... \
            -o "$comparative_coverage/bin/kvstore" \
            ./capstones/comparative/solution/kvstore/cmd/kvstore
          COMPARATIVE_KV_PROGRAM="$PWD/$comparative_coverage/bin/kvstore" \
          GOCOVERDIR="$PWD/$comparative_coverage/data" \
            go test -timeout=3m ./capstones/comparative/solution/kvstore
          coverage_inputs=$(
            find "$comparative_coverage/data" \
              -mindepth 1 -maxdepth 1 -type d -printf '%p,' |
              sed 's/,$//'
          )
          go tool covdata textfmt \
            -i="$coverage_inputs" \
            -o=comparative-coverage.out
          bash scripts/check-coverage.sh comparative-coverage.out 75
          cleanup
          trap - EXIT

      - name: Run fuzz smoke test
        if: matrix.go-version == '1.26.x'
        run: |
          go test -run '^$' \
            -fuzz '^FuzzParseKeyValue$' \
            -fuzztime=2s \
            ./lessons/08_testing/08_fuzzing
          go test -run '^$' \
            -fuzz '^FuzzLoadConfig$' \
            -fuzztime=2s \
            ./capstones/idiomatic/solution/monitor/domain

      - name: Run staticcheck
        if: matrix.go-version == '1.26.x'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          {
            go list ./lessons/...
            go list ./exercises/... | grep '/solution$'
            go list ./projects/tasks/solution/...
            go list ./projects/tasks/tests/...
            go list ./projects/tasks
            go list ./capstones/comparative/solution/...
            go list ./capstones/comparative/tests/...
            go list ./capstones/idiomatic/solution/...
            go list ./capstones/idiomatic/tests/...
            go list ./capstones/testsupport
            go list ./tools/...
          } | xargs "$(go env GOPATH)/bin/staticcheck"

      - name: Scan vulnerabilities
        if: matrix.go-version == '1.26.x'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Check Markdown links
        run: go run ./tools/checklinks
